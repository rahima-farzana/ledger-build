name: ledger build and scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  
  workflow_dispatch:
   inputs:
     ECRURL:
      description: "ECR Registry URL"
      required: true
      default: "081654307023.dkr.ecr.ap-south-1.amazonaws.com"

     APPREPO:
      description: "Docker Repo Name"
      required: true
      default: "wezvatechledger"

     REGION:
      description: "AWS Region"
      required: true
      default: "ap-south-1"  

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout Code
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify files
        run: |
          echo "Repository successfully checked out"
          ls -R

      # -----------------------------
      # Setup Java
      # -----------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # -----------------------------
      # Build Spring Boot Jar
      # -----------------------------
      - name: Build Spring Boot Jar
        run: mvn clean package -Dmaven.test.skip=true

      - name: Rename Artifact
        run: cp target/*.jar target/backend_rel${{ github.run_number }}.jar

      # -----------------------------
      # Code Coverage Report (JaCoCo)
      # -----------------------------
      - name: Code Coverage Report (JaCoCo)
        run: mvn clean verify -Ddependency-check.skip=true

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      # -----------------------------
      # Trivy Dependency Check (SCA)
      # -----------------------------
      - name: Trivy FS Scan (SCA)
        continue-on-error: true
        run: |
          mkdir -p trivy-report
          
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -v ${{ github.workspace }}/trivy-report:/report \
            aquasec/trivy:0.50.0 \
            fs /project \
            --format json \
            --output /report/trivy-report.json

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: ./trivy-report

      # ---------------------
      # SonarCloud SAST Scan
      # ---------------------
      - name: SonarCloud SAST Scan
        continue-on-error: true
        if: github.ref == 'refs/heads/main'
        env:
          SONAR_TOKEN: ${{ 49da8747919d009e2c1bae96358b15ef8aa8721c }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=wezva-fintech_ledger-build \
            -Dsonar.organization=wezva-fintech \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.branch.name=${{ github.ref_name }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true #For quality gate

      # -----------------------------
      # Configure AWS Credentials
      # -----------------------------     
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{AKIA6CSK2GGGS3NQ3Y4H}}
          aws-secret-access-key: ${{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}}
          aws-region: ${{ inputs.REGION || 'ap-south-1' }}

      # -----------------------------
      # Login to Amazon ECR
      # -----------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2 

      # -----------------------------
      # Build & Push Docker Image
      # ----------------------------- 
      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ inputs.ECRURL || '081654307023.dkr.ecr.ap-south-1.amazonaws.com' }}
          REPOSITORY: ${{ inputs.APPREPO || 'wezvatechledger' }}
          IMAGE_TAG: fb${{ github.run_number }}
        run: |
          echo "Building Docker Image..."
          docker build -t $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG .
          echo "Pushing Docker Image..."
          docker push $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG  

      # ------------------------
      # Wait till scan complete
      # ------------------------
      - name: Wait for Scan Completion
        run: |
          for i in {1..12}; do
            STATUS=$(aws ecr describe-image-scan-findings \
              --repository-name ${{ inputs.APPREPO || 'wezvatechledger' }} \
              --image-id imageTag=rel${{ github.run_number }} \
              --query 'imageScanStatus.status' \
              --output text 2>/dev/null || echo "NOT_FOUND")

            echo "Scan Status: $STATUS"

            if [ "$STATUS" = "COMPLETE" ]; then
              break
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "Scan failed"
              exit 1
            fi

            if [ "$STATUS" = "NOT_FOUND" ]; then
              echo "Scan not yet available, retrying..."
            fi

            sleep 10
          done

      # ------------------------
      # Get vulnerability details
      # ------------------------
      - name: Get Vulnerability Counts
        id: scan
        run: |
          CRITICAL=$(aws ecr describe-image-scan-findings \
            --repository-name ${{ inputs.APPREPO || 'wezvatechledger' }} \
            --image-id imageTag=rel${{ github.run_number }} \
            --query 'imageScanFindings.findingSeverityCounts.CRITICAL' \
            --output text 2>/dev/null || echo 0)

          HIGH=$(aws ecr describe-image-scan-findings \
            --repository-name ${{ inputs.APPREPO || 'wezvatechledger' }} \
            --image-id imageTag=rel${{ github.run_number }} \
            --query 'imageScanFindings.findingSeverityCounts.HIGH' \
            --output text 2>/dev/null || echo 0)

          echo "Critical: $CRITICAL"
          echo "High: $HIGH"

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT   
          
      # -----------------------
      # Quality Gate for Image
      # ----------------------   
      - name: Enforce Security Gate (Ignore Failures)
        continue-on-error: true # ----------> Because here we have high & critical Vulnerability
        run: |
          CRITICAL=${{ steps.scan.outputs.critical }}
          HIGH=${{ steps.scan.outputs.high }}

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "⚠️ Vulnerabilities found but ignored"
            exit 1
          else
            echo "✅ No vulnerabilities"
          fi

  # -----------------------------
  # Trigger CD Job
  # -----------------------------
  trigger-cd-pipeline:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: ${{ success() && github.ref == 'refs/heads/main' }}

    steps:
      - name: Trigger CD Pipeline
        run: |
          IMAGE_TAG="rel${{ github.run_number }}"

          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/wezva-fintech/ledger-deployment/actions/workflows/deploy.yml/dispatches \
          -d "{
            \"ref\":\"main\",
            \"inputs\": {
              \"ECRURL\": \"${{ inputs.ECRURL }}/\",
              \"REPO\": \"${{ inputs.APPREPO }}\",
              \"IMAGE\": \"$IMAGE_TAG\",
              \"TEST\": \"regression\"
            }
          }"
