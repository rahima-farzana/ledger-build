name: ledger build and scan

on:
  push:
    branches:
      - feature

  workflow_dispatch:
    inputs:
      ECRURL:
        description: "ECR Registry URL"
        required: true
        default: "081654307023.dkr.ecr.ap-south-1.amazonaws.com"

      APPREPO:
        description: "Docker Repo Name"
        required: true
        default: "wezvatechledger"

      REGION:
        description: "AWS Region"
        required: true
        default: "ap-south-1"  

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout Code
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # Setup Java
      # -----------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # -----------------------------
      # Build Spring Boot Jar
      # -----------------------------
      - name: Build Spring Boot Jar
        run: mvn clean package -Dmaven.test.skip=true

      - name: Rename Artifact
        run: cp target/*.jar target/backend_fb${{ github.run_number }}.jar

      # -----------------------------
      # Code Coverage Report (JaCoCo)
      # -----------------------------
      - name: Code Coverage Report (JaCoCo)
        run: echo "completed code coverage"

      # -----------------------------
      # Trivy Dependency Check (SCA)
      # -----------------------------
      - name: Trivy FS Scan (SCA)
        run: echo "completed SCA"

      # ---------------------
      # SonarCloud SAST Scan
      # ---------------------
      - name: SonarCloud SAST Scan
        run: echo "completed Sonar Scan"

      # -----------------------------
      # Configure AWS Credentials
      # -----------------------------     
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.REGION || 'ap-south-1' }}

      # -----------------------------
      # Login to Amazon ECR
      # -----------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2 

      # -----------------------------
      # Build & Push Docker Image
      # ----------------------------- 
      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ inputs.ECRURL || '081654307023.dkr.ecr.ap-south-1.amazonaws.com' }}
          REPOSITORY: ${{ inputs.APPREPO || 'wezvatechledger' }}
          IMAGE_TAG: fb${{ github.run_number }}
        run: |
          echo "Building Docker Image..."
          docker build -t $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG .
          echo "Pushing Docker Image..."
          docker push $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG  

  # -----------------------------
  # Trigger CD Job (Fixed Indentation)
  # -----------------------------
  trigger-cd-pipeline:
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: Trigger CD Pipeline
        run: |
          IMAGE_TAG="fb${{ github.run_number }}"

          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/wezva-fintech/ledger-deployment/actions/workflows/deploy.yml/dispatches \
          -d "{
            \"ref\":\"main\",
            \"inputs\": {
              \"ECRURL\": \"${{ inputs.ECRURL }}/\",
              \"REPO\": \"${{ inputs.APPREPO }}\",
              \"IMAGE\": \"$IMAGE_TAG\",
              \"TEST\": \"functional\"
            }
          }"
